# all-the-images corpus generation
#
# Usage:
#   docker compose build                      # Build (compiles all encoders)
#   docker compose run --rm generate          # Full corpus
#   docker compose run --rm quick             # Quick smoke-test subset
#   docker compose run --rm shell             # Interactive shell with all encoders
#
# Re-encode your own images:
#   docker compose run --rm generate --sources-dir /input
#
# Custom dimensions:
#   docker compose run --rm generate --dimensions 320x240,1920x1080,4096
#
# Select formats:
#   docker compose run --rm generate --formats jpeg,png,avif

services:
  generate:
    build: .
    volumes:
      - ./corpus:/output
      - ${SOURCES_DIR:-./sources}:/input:ro
    environment:
      - QUICK_MODE=0
    command: ["--output", "/output"]

  quick:
    build: .
    volumes:
      - ./corpus:/output
      - ${SOURCES_DIR:-./sources}:/input:ro
    environment:
      - QUICK_MODE=1
    command: ["--output", "/output", "--quick"]

  shell:
    build: .
    volumes:
      - ./corpus:/output
      - ${SOURCES_DIR:-./sources}:/input:ro
    entrypoint: /bin/bash
    stdin_open: true
    tty: true
